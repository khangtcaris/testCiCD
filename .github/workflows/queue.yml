name: Queue Workflow

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  add-to-queue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout queue branch
        uses: actions/checkout@v4
        with:
          ref: queue-store
          token: ${{ secrets.QUEUE_PAT }}

      - name: Setup Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Ensure queue.txt exists
        run: |
          FILE="queue.txt"
          if [ ! -f "$FILE" ]; then
            echo "[]" > "$FILE"
          fi
          echo "📂 Current queue.txt content:"
          cat "$FILE"

      - name: Add PR metadata if not exists
        run: |
          FILE="queue.txt"
          PR_NUM="${{ github.event.pull_request.number }}"
          TITLE="${{ github.event.pull_request.title }}"
          REF="${{ github.head_ref }}"
          LINE="{\"pr\":\"$PR_NUM\",\"title\":\"$TITLE\",\"ref\":\"$REF\"}"
          if ! grep -q "\"pr\":\"$PR_NUM\"" "$FILE" 2>/dev/null; then
            echo "✅ Adding PR #$PR_NUM..."
            echo "$LINE" >> "$FILE"
          else
            echo "ℹ️ PR #$PR_NUM already in queue, skipping append"
          fi
          echo "📂 Content AFTER update:"
          cat "$FILE"

      - name: Commit queue update
        run: |
          git add queue.txt
          git commit -m "Queue update for PR #${{ github.event.pull_request.number }}" || echo "No changes"
          git push origin queue-store || echo "No push"

      # 🔑 Create Pending Queue Check
      - name: Create Pending Queue Check
        id: create-check
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request
            if (!pr) {
              core.setFailed("No pull_request found in context.payload")
            } else {
              const { data: fullPR } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number
              })
              const check = await github.rest.checks.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'Queue Status',
                head_sha: fullPR.head.sha,
                status: 'in_progress',
                output: {
                  title: 'Queued for Build',
                  summary: `PR #${pr.number} is in the build queue and will run shortly.`
                }
              })
              core.setOutput('check_id', check.data.id)
            }

      - name: Check if build running
        id: check
        run: |
          RESP=$(curl -s -H "Authorization: token ${{ secrets.QUEUE_PAT }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/build.yml/runs?status=in_progress&per_page=1")
          RUNNING=$(echo "$RESP" | jq '.total_count')
          echo "RUNNING=$RUNNING" >> $GITHUB_ENV
          echo "Builds running: $RUNNING"

      - name: Trigger build if idle
        if: env.RUNNING == '0'
        run: |
          PR="${{ github.event.pull_request.number }}"
          TITLE="${{ github.event.pull_request.title }}"
          REF="${{ github.head_ref }}"
          CHECK_ID="${{ steps.create-check.outputs.check_id }}"

          echo "🚀 Triggering build for PR #$PR on branch $REF"
          PAYLOAD=$(jq -n \
            --arg ref "$REF" \
            --arg pr "$PR" \
            --arg title "$TITLE" \
            --arg check_id "$CHECK_ID" \
            '{ref: $ref, inputs: {pr_number: $pr, title: $title, ref: $ref, check_id: $check_id}}')
          echo "Payload: $PAYLOAD"
          curl -X POST \
            -H "Authorization: token ${{ secrets.QUEUE_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/build.yml/dispatches" \
            -d "$PAYLOAD"
