name: Queue Workflow

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  add-to-queue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout queue branch
        uses: actions/checkout@v4
        with:
          ref: queue-store
          token: ${{ secrets.QUEUE_PAT }}

      - name: Setup Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Ensure queue.json exists
        run: |
          mkdir -p .github
          FILE=.github/queue.json
          [ -f "$FILE" ] || echo "[]" > $FILE
          cat $FILE

      - name: Add PR metadata if not exists
        run: |
          FILE=.github/queue.json
          PR_NUM="${{ github.event.pull_request.number }}"
          EXISTS=$(jq --arg pr "$PR_NUM" 'map(select(.pr == $pr)) | length' $FILE)
          if [ "$EXISTS" -eq 0 ]; then
            jq ". + [{\"pr\": \"$PR_NUM\", \"title\": \"${{ github.event.pull_request.title }}\", \"ref\": \"${{ github.head_ref }}\"}]" $FILE > tmp.json && mv tmp.json $FILE
            echo "✅ Added PR #$PR_NUM to queue"
          else
            echo "ℹ️ PR #$PR_NUM already in queue, skipping append"
          fi
          cat $FILE

      - name: Commit queue update
        run: |
          git add .github/queue.json
          git status
          git commit -m "Add PR #${{ github.event.pull_request.number }} to queue" || echo "No changes"
          git push origin queue-store

      - name: Check if build running
        id: check
        run: |
          RESP=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/build.yml/runs?status=in_progress&per_page=1")
          RUNNING=$(echo "$RESP" | jq '.total_count')
          echo "RUNNING=$RUNNING" >> $GITHUB_ENV
          echo "Builds running: $RUNNING"

      - name: Trigger build via API
        if: env.RUNNING == '0'
        run: |
          MSG=$(jq '.[0]' .github/queue.json)
          if [ "$MSG" != "null" ]; then
            curl -X POST \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/${{ github.repository }}/actions/workflows/build.yml/dispatches \
              -d "{\"ref\":\"$(echo $MSG | jq -r .ref)\",\"inputs\":{\"pr_number\":\"$(echo $MSG | jq -r .pr)\",\"title\":\"$(echo $MSG | jq -r .title)\",\"ref\":\"$(echo $MSG | jq -r .ref)\"}}"
          else
            echo "ℹ️ Queue is empty, nothing to trigger"
          fi
