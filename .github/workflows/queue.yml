name: Queue Workflow

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  add-to-queue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout queue branch
        uses: actions/checkout@v4
        with:
          ref: queue-store
          token: ${{ secrets.QUEUE_PAT }}

      - name: Setup Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Add PR metadata to queue.json
        run: |
          mkdir -p .github
          FILE=.github/queue.json
          [ -f "$FILE" ] || echo "[]" > $FILE
          jq ". + [{\"pr\": \"${{ github.event.pull_request.number }}\", \"title\": \"${{ github.event.pull_request.title }}\"}]" $FILE > tmp.json && mv tmp.json $FILE
          cat $FILE

      - name: Commit queue update
        run: |
          git add .github/queue.json
          git commit -m "Add PR #${{ github.event.pull_request.number }} to queue" || echo "No changes"
          git push origin queue-store

      - name: Check if build running
        id: check
        run: |
          RESP=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/build.yml/runs?status=in_progress&per_page=1")
          RUNNING=$(echo "$RESP" | jq '.total_count')
          echo "RUNNING=$RUNNING" >> $GITHUB_ENV
          echo "Builds running: $RUNNING"

      - name: Trigger build
        if: env.RUNNING == '0'
        uses: peter-evans/workflow-dispatch@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          workflow: build.yml
          ref: ${{ github.head_ref }}
          inputs:
            pr_number: ${{ github.event.pull_request.number }}
            title: ${{ github.event.pull_request.title }}