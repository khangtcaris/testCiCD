name: Queue Workflow

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  add-to-queue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout queue branch
        uses: actions/checkout@v4
        with:
          ref: queue-store
          token: ${{ secrets.QUEUE_PAT }}

      - name: Setup Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Ensure queue.json exists
        run: |
          mkdir -p .github
          FILE=".github/queue.json"
          if [ ! -f "$FILE" ]; then
            echo "[]" > "$FILE"
          fi
          echo "📂 Current queue.json content:"
          cat "$FILE"

      - name: Add PR metadata if not exists
        run: |
          FILE="queue.txt"
          PR_NUM="${{ github.event.pull_request.number }}"
          TITLE="${{ github.event.pull_request.title }}"
          REF="${{ github.head_ref }}"

          EXISTS=$(jq --arg pr "$PR_NUM" 'map(select(.pr == $pr)) | length' "$FILE")
          EXISTS=${EXISTS:-0}

          if [ "$EXISTS" -eq 0 ]; then
            echo "✅ Adding PR #$PR_NUM..."
            jq --arg pr "$PR_NUM" --arg title "$TITLE" --arg ref "$REF" \
              '. + [{pr: $pr, title: $title, ref: $ref}]' "$FILE" > tmp.json
            mv tmp.json "$FILE"
          else
            echo "ℹ️ PR #$PR_NUM already in queue, skipping append"
          fi

          echo "📂 Content AFTER update:"
          cat "$FILE"
          echo "📏 File checksum AFTER update:"
          sha256sum "$FILE"

      - name: Commit queue update
        run: |
          git add .github/queue.json
          echo "🔎 Git status before commit:"
          git status
          echo "🔎 Git diff staged changes:"
          git diff --staged || echo "No diff"
          git commit -m "Queue update for PR #${{ github.event.pull_request.number }}" || echo "No changes"
          git push origin queue-store || echo "No push"

      - name: Check if build running
        id: check
        run: |
          RESP=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/build.yml/runs?status=in_progress&per_page=1")
          RUNNING=$(echo "$RESP" | jq '.total_count')
          echo "RUNNING=$RUNNING" >> $GITHUB_ENV
          echo "Builds running: $RUNNING"

      - name: Trigger build if idle
        if: env.RUNNING == '0'
        run: |
          PR="${{ github.event.pull_request.number }}"
          TITLE="${{ github.event.pull_request.title }}"
          REF="${{ github.head_ref }}"
          echo "🚀 Triggering build for PR #$PR on branch $REF"
          PAYLOAD=$(jq -n \
            --arg ref "$REF" \
            --arg pr "$PR" \
            --arg title "$TITLE" \
            '{ref: $ref, inputs: {pr_number: $pr, title: $title, ref: $ref}}')
          echo "Payload: $PAYLOAD"
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/build.yml/dispatches" \
            -d "$PAYLOAD"
