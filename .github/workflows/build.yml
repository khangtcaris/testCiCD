name: Build Workflow
run-name: "Build for PR #${{ github.event.inputs.pr_number }} - ${{ github.event.inputs.title }}"

on:
  workflow_dispatch:
    inputs:
      pr_number:
        required: true
      title:
        required: true
      ref:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout queue branch
        uses: actions/checkout@v4
        with:
          ref: queue-store
          token: ${{ secrets.QUEUE_PAT }}

      - name: Get first message from queue.txt
        id: get
        run: |
          LINE=$(head -n 1 queue.txt)
          if [ -z "$LINE" ]; then
            echo "❌ No message found. Exiting."
            exit 1
          fi
          echo "msg=$LINE" >> $GITHUB_OUTPUT

      - name: Verify message matches input
        run: |
          MSG='${{ steps.get.outputs.msg }}'
          PR=$(echo $MSG | jq -r .pr)
          TITLE=$(echo $MSG | jq -r .title)
          REF=$(echo $MSG | jq -r .ref)
          if [ "$PR" != "${{ github.event.inputs.pr_number }}" ] || \
             [ "$TITLE" != "${{ github.event.inputs.title }}" ] || \
             [ "$REF" != "${{ github.event.inputs.ref }}" ]; then
            echo "❌ Queue head does not match inputs. Exiting."
            exit 1
          fi
          echo "✅ Message matches inputs. Proceeding build..."

      - name: Simulate Build (5 minutes)
        run: |
          MSG='${{ steps.get.outputs.msg }}'
          echo "🚀 Building PR $(echo $MSG | jq -r .pr): $(echo $MSG | jq -r .title) on branch $(echo $MSG | jq -r .ref)"
          sleep 300
          echo "✅ Build finished"

      - name: Remove processed message (delete first line)
        run: |
          sed -i '1d' queue.txt
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add queue.txt
          git commit -m "Processed PR ${{ github.event.inputs.pr_number }}" || echo "No changes"
          git push origin queue-store

      - name: Check if queue still has items
        id: check
        run: |
          COUNT=$(wc -l < queue.txt)
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          if [ $COUNT -gt 0 ]; then
            NEXT=$(head -n 1 queue.txt)
            echo "next=$NEXT" >> $GITHUB_OUTPUT
          fi

      - name: Trigger next build via API
        if: steps.check.outputs.count != '0'
        run: |
          NEXT='${{ steps.check.outputs.next }}'
          PR=$(echo $NEXT | jq -r .pr)
          TITLE=$(echo $NEXT | jq -r .title)
          REF=$(echo $NEXT | jq -r .ref)
          echo "🚀 Triggering next build for PR #$PR on branch $REF"
          curl -X POST \
            -H "Authorization: token ${{ secrets.QUEUE_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/build.yml/dispatches \
            -d "{\"ref\":\"$REF\",\"inputs\":{\"pr_number\":\"$PR\",\"title\":\"$TITLE\",\"ref\":\"$REF\"}}"
